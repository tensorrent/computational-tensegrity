name: Build Paper

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy mpmath matplotlib

    - name: Generate Data and Figures
      run: |
        make data
        make figures

    - name: Prepare Paper Assets
      run: |
        cd paper
        cp ../figures/*.pdf .
        cp ../src/zeta.py ../rc_zeta_listing.py
        cp ../src/sigma_engine.py ../rc_sigma_listing.py
        cp ../src/main.py ../rc_main_listing.py

    - name: Compile TeX
      uses: xu-cheng/latex-action@v3
      with:
        root_file: Computational_Tensegrity_Wallace_2026.tex
        working_directory: paper

    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: Computational_Tensegrity_Wallace_2026.pdf
        path: paper/Computational_Tensegrity_Wallace_2026.pdf
