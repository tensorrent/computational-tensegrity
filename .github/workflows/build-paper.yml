name: Build Paper

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy mpmath matplotlib

    - name: Compile TeX and Data
      uses: xu-cheng/latex-action@v3
      with:
        root_file: Computational_Tensegrity_Wallace_2026.tex
        working_directory: paper
        pre_compile: |
          cd ..
          make data
          make figures
          make paper

    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: Computational_Tensegrity_Wallace_2026.pdf
        path: paper/Computational_Tensegrity_Wallace_2026.pdf
